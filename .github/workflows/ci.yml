name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lifeflow_test
          POSTGRES_USER: lifeflow
          POSTGRES_PASSWORD: lifeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lifeflow -d lifeflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_dev_placeholder?schema=public
      DIRECT_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_dev_placeholder?schema=public
      TEST_DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_test?schema=public
      APP_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_test?schema=public
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:integration
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          TEST_DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_test?schema=public
          APP_ORIGIN: http://127.0.0.1:41731
